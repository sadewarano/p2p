<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>P2P Chat</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>

    <div class="profile">
        <div id="peerName">
            🌐 P2P Chat
        </div>

        <small id="status">
            Belum Konek
        </small>
    </div>

</header>


<div class="tabs">

    <button class="tab active"
        onclick="showTab('connection')">
        Koneksi
    </button>

    <button class="tab"
        onclick="showTab('chat')">
        Chat
    </button>

</div>


<!-- ===================== -->
<!-- TAB KONEKSI -->
<!-- ===================== -->

<div id="connectionTab">

    <div id="connectionBox" class="card">

        <h3>Koneksi Baru</h3>

        <textarea
            id="localSDP"
            readonly
            placeholder="Kode saya">
        </textarea>

        <div class="row">

            <button id="btnCopy">
                📋 Copy
            </button>

            <button id="btnUpload">
                ☁️ Kirim
            </button>

        </div>

        <textarea
            id="remoteSDP"
            placeholder="Tempel kode teman">
        </textarea>

        <div class="row">

            <button id="btnFetch">
                📥 Ambil
            </button>

        </div>

        <div class="row">

            <button id="btnOffer">
                🟢 Buat
            </button>

            <button id="btnAnswer">
                🔵 Proses
            </button>

        </div>

    </div>

</div>


<!-- ===================== -->
<!-- TAB CHAT -->
<!-- ===================== -->

<div id="chatTab" style="display:none;">

    <div class="layout">

        <div class="chat">

            <div id="chatBox">
            </div>

            <div class="input">

                <input
                    id="msgInput"
                    placeholder="Ketik pesan...">

                <button
                    id="btnSend"
                    disabled>
                    ➤
                </button>

            </div>

        </div>

    </div>

</div>


<div id="toast">
    Tersalin
</div>


<script>

function showTab(tab){

    document.getElementById("connectionTab").style.display =
        tab==="connection" ? "block" : "none";

    document.getElementById("chatTab").style.display =
        tab==="chat" ? "block" : "none";

    const tabs=document.querySelectorAll(".tab");

    tabs[0].classList.toggle("active",tab==="connection");
    tabs[1].classList.toggle("active",tab==="chat");
}

</script>

<script src="app.js"></script>

</body>
</html>
